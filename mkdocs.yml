site_name: OrangeHRM QA Automation
site_description: Production-ready QA automation framework for OrangeHRM — E2E, API, and performance testing
site_url: https://germanobrian1998.github.io/orangehrm-automation/
repo_url: https://github.com/germanobrian1998/orangehrm-automation
repo_name: germanobrian1998/orangehrm-automation

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - fenced_code
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details

nav:
  - Home: index.md

  - Getting Started:
    - Quick Start: QUICK_START.md
    - Setup: SETUP.md

  - Core Concepts:
    - Architecture: ARCHITECTURE.md
    - Test Strategy: TEST-STRATEGY.md
    - Decision Making: DECISION_MAKING.md
    - Best Practices: BEST-PRACTICES.md

  - Testing Guides:
    - API Testing: API-DOCUMENTATION.md
    - Security Testing: SECURITY.md
    - Performance: PERFORMANCE.md
    - Load Testing: LOAD-TESTING.md
    - Mock API: MOCK-API.md
    - Allure Reports: ALLURE-REPORTS.md

  - Interview Prep:
    - Interview Questions & Answers: INTERVIEW-PREP.md

  - Operations:
    - CI/CD Pipeline: CI-CD.md
    - Monorepo Guide: MONOREPO.md
    - Environments: ENVIRONMENTS.md
    - Troubleshooting: TROUBLESHOOTING.md
    - Known Issues: KNOWN-ISSUES.md

  - Reference:
    - Contributing: CONTRIBUTING.md
    - Performance Benchmarks: PERFORMANCE_BENCHMARKS.md
    - Scalability: SCALABILITY.md
    - Execution Metrics: EXECUTION_METRICS.md
    - Demo: DEMO.md
