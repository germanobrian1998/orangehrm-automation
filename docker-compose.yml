services:
  playwright:
    build: .
    image: orangehrm-automation
    volumes:
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
    environment:
      - CI=true
    command: npx playwright test

  smoke:
    build: .
    image: orangehrm-automation
    volumes:
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
    environment:
      - CI=true
    command: npm run test:smoke

  regression:
    build: .
    image: orangehrm-automation
    volumes:
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
    environment:
      - CI=true
    command: npm run test:regression
