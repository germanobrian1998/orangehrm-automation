services:
  test:
    build: .
    environment:
      - ORANGEHRM_BASE_URL=https://opensource-demo.orangehrmlive.com
      - HEADLESS=true
      - CI=true
    volumes:
      - ./test-results:/app/test-results
      - ./allure-results:/app/allure-results
      - ./playwright-report:/app/playwright-report
    networks:
      - test-network

  smoke:
    build: .
    image: orangehrm-automation
    volumes:
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
    environment:
      - CI=true
    command: npm run test:smoke
    networks:
      - test-network

  regression:
    build: .
    image: orangehrm-automation
    volumes:
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
    environment:
      - CI=true
    command: npm run test:regression
    networks:
      - test-network

  mock-server:
    image: mockserver/mockserver:latest
    ports:
      - "1080:1080"
    environment:
      - MOCKSERVER_PROPERTY_FILE=/config/mockserver.properties
    volumes:
      - ./mock-config:/config
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
