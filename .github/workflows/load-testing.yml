name: Load Testing

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM
  workflow_dispatch:

jobs:
  load-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install k6
        run: sudo apt-get update && sudo apt-get install -y k6

      - name: Run smoke load test
        run: npm run load:smoke

      - name: Run soak test
        run: npm run load:soak

      - name: Run spike test
        run: npm run load:spike

      - name: Run stress test
        run: npm run load:stress

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: ./k6-results/
          retention-days: 90
