name: Load Testing

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM
  workflow_dispatch:

permissions:
  contents: read

jobs:
  load-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3232A
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Create results directory
        run: mkdir -p k6-results

      - name: Run smoke load test
        run: k6 run --out json=k6-results/smoke-results.json tests/performance/smoke-load.js

      - name: Run soak test
        run: k6 run --out json=k6-results/soak-results.json tests/performance/soak-test.js

      - name: Run spike test
        run: k6 run --out json=k6-results/spike-results.json tests/performance/spike-test.js

      - name: Run stress test
        run: k6 run --out json=k6-results/stress-results.json tests/performance/stress-test.js

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: ./k6-results/
          retention-days: 90
