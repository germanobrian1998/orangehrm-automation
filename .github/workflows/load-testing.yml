name: Load Testing

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  load-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg ca-certificates
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Verify k6 installation
        run: k6 version

      - name: Validate load-test files
        run: |
          test -f tests/performance/smoke-load.js
          test -f tests/performance/soak-test.js
          test -f tests/performance/spike-test.js
          test -f tests/performance/stress-test.js

      - name: Health check OrangeHRM
        run: ./scripts/health-check.sh

      - name: Create results directory
        run: mkdir -p k6-results

      - name: Run smoke load test
        run: k6 run --out json=k6-results/smoke-results.json tests/performance/smoke-load.js

      - name: Run soak test
        run: k6 run --out json=k6-results/soak-results.json tests/performance/soak-test.js

      - name: Run spike test
        run: k6 run --out json=k6-results/spike-results.json tests/performance/spike-test.js

      - name: Run stress test
        run: k6 run --out json=k6-results/stress-results.json tests/performance/stress-test.js

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: ./k6-results/
          if-no-files-found: error
          retention-days: 90
