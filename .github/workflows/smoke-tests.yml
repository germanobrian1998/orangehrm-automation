name: 🔥 Smoke Tests

# Run after Code Quality passes — on both PRs and pushes to main
on:
  workflow_run:
    workflows: [ "📊 Code Quality" ]
    types: [ completed ]

permissions:
  contents: read

jobs:
  smoke-tests:
    name: Smoke Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run when code-quality succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No npm cache here — this workflow can run on untrusted PR code,
          # and caching with untrusted code risks cache poisoning.

      - name: Install dependencies
        run: npm ci

      - name: Remove problematic APT repositories
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Smoke Tests
        run: npm run test:smoke

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.event.workflow_run.head_sha }}
          path: playwright-report/
          retention-days: ${{ github.event.workflow_run.event == 'pull_request' && 7 || 30 }}

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-screenshots-${{ github.event.workflow_run.head_sha }}
          path: test-results/
          retention-days: ${{ github.event.workflow_run.event == 'pull_request' && 7 || 30 }}
