name: 🧪 Full Matrix Tests

# Run after Smoke Tests pass — only on the main branch
on:
  workflow_run:
    workflows: [ "🔥 Smoke Tests" ]
    types: [ completed ]

permissions:
  contents: read

jobs:
  full-matrix:
    name: Full Matrix (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # Only run when smoke-tests succeeded on main
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Remove problematic APT repositories
        # These Microsoft/Azure repos conflict with Playwright's browser installation
        # and cause apt-get errors in the GitHub-hosted runner environment.
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run tests - ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }}
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-matrix-results-${{ matrix.browser }}-${{ github.event.workflow_run.head_sha }}
          path: test-results/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-matrix-report-${{ matrix.browser }}-${{ github.event.workflow_run.head_sha }}
          path: playwright-report/
          retention-days: 30