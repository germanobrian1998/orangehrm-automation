# Publish the latest Playwright HTML report to GitHub Pages so that
# recruiters and reviewers can browse live test results without
# downloading artifacts.
#
# View the live report at:
# https://germanobrian1998.github.io/orangehrm-automation/

name: 📄 Publish Test Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Remove problematic APT repositories
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Health check OrangeHRM
        run: ./scripts/health-check.sh

      - name: Run smoke tests with retry
        run: |
          for attempt in 1 2 3; do
            npm run test:smoke && exit 0
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 5))
          done

      - name: Validate report output
        run: test -d playwright-report

      - name: Upload Playwright report as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
