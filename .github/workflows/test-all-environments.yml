name: Test All Environments

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ORANGEHRM_BASE_URL: https://opensource-demo.orangehrmlive.com

jobs:
  test-dev:
    name: Tests – development
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Health check OrangeHRM (development)
        run: |
          for i in {1..8}; do
            if curl --silent --show-error --fail --max-time 20 "${ORANGEHRM_BASE_URL%/}/web/index.php/auth/login" > /dev/null; then
              echo "OrangeHRM is reachable"
              exit 0
            fi
            echo "Health check attempt $i/8 failed. Retrying..."
            sleep 15
          done
          echo "OrangeHRM health check failed after 8 attempts"
          exit 1

      - name: Run tests (development)
        run: npm run test:dev
        env:
          ENVIRONMENT: development
        continue-on-error: false

      - name: Upload dev test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-results
          path: test-results/development/
          retention-days: 30

  test-staging:
    name: Tests – staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Health check OrangeHRM (staging)
        run: |
          for i in {1..8}; do
            if curl --silent --show-error --fail --max-time 20 "${ORANGEHRM_BASE_URL%/}/web/index.php/auth/login" > /dev/null; then
              echo "OrangeHRM is reachable"
              exit 0
            fi
            echo "Health check attempt $i/8 failed. Retrying..."
            sleep 15
          done
          echo "OrangeHRM health check failed after 8 attempts"
          exit 1

      - name: Run tests (staging)
        run: npm run test:staging
        env:
          ENVIRONMENT: staging
        continue-on-error: false

      - name: Upload staging test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-results
          path: test-results/staging/
          retention-days: 30

  test-ci:
    name: Tests – CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Health check OrangeHRM (CI)
        run: |
          for i in {1..8}; do
            if curl --silent --show-error --fail --max-time 20 "${ORANGEHRM_BASE_URL%/}/web/index.php/auth/login" > /dev/null; then
              echo "OrangeHRM is reachable"
              exit 0
            fi
            echo "Health check attempt $i/8 failed. Retrying..."
            sleep 15
          done
          echo "OrangeHRM health check failed after 8 attempts"
          exit 1

      - name: Run tests (CI)
        run: npm run test:ci
        env:
          ENVIRONMENT: ci
          CI: 'true'
        continue-on-error: false

      - name: Upload CI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results
          path: test-results/ci/
          retention-days: 30
