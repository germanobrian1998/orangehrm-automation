name: Test All Environments

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests – ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: development
            test_command: test:dev
            artifact_name: dev-results
          - environment: staging
            test_command: test:staging
            artifact_name: staging-results
          - environment: ci
            test_command: test:ci
            artifact_name: ci-results
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run tests in Docker
        run: docker compose run --rm test
        env:
          ENVIRONMENT: ${{ matrix.environment }}
          TEST_COMMAND: ${{ matrix.test_command }}
          ORANGEHRM_BASE_URL: https://opensource-demo.orangehrmlive.com

      - name: Upload ${{ matrix.environment }} test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: test-results/${{ matrix.environment }}/
          retention-days: 30
