name: Test All Environments

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-dev:
    name: Tests – development
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      ORANGEHRM_BASE_URL: https://opensource-demo.orangehrmlive.com
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker compose build test

      - name: Health check (development)
        run: docker compose run --rm test /app/scripts/health-check.sh

      - name: Run tests in Docker (development)
        run: docker compose run --rm -e ENVIRONMENT=development test npm run test:dev

      - name: Upload dev test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-results
          path: test-results/development/
          retention-days: 30

  test-staging:
    name: Tests – staging
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      ORANGEHRM_BASE_URL: https://opensource-demo.orangehrmlive.com
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker compose build test

      - name: Health check (staging)
        run: docker compose run --rm test /app/scripts/health-check.sh

      - name: Run tests in Docker (staging)
        run: docker compose run --rm -e ENVIRONMENT=staging test npm run test:staging

      - name: Upload staging test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-results
          path: test-results/staging/
          retention-days: 30

  test-ci:
    name: Tests – CI
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      ORANGEHRM_BASE_URL: https://opensource-demo.orangehrmlive.com
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker compose build test

      - name: Health check (CI)
        run: docker compose run --rm test /app/scripts/health-check.sh

      - name: Run tests in Docker (CI)
        run: docker compose run --rm -e ENVIRONMENT=ci test npm run test:ci

      - name: Upload CI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results
          path: test-results/ci/
          retention-days: 30
