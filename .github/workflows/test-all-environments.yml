name: Test All Environments

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-dev:
    name: Tests – development
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Health check OrangeHRM
        run: ./scripts/health-check.sh

      - name: Run tests (development) with retry
        env:
          ENVIRONMENT: development
        run: |
          for attempt in 1 2 3; do
            npm run test:dev && exit 0
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 5))
          done

      - name: Upload dev test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-results
          path: test-results/development/
          if-no-files-found: warn
          retention-days: 30

  test-staging:
    name: Tests – staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Health check OrangeHRM
        run: ./scripts/health-check.sh

      - name: Run tests (staging) with retry
        env:
          ENVIRONMENT: staging
        run: |
          for attempt in 1 2 3; do
            npm run test:staging && exit 0
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 5))
          done

      - name: Upload staging test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-results
          path: test-results/staging/
          if-no-files-found: warn
          retention-days: 30

  test-ci:
    name: Tests – CI
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Health check OrangeHRM
        run: ./scripts/health-check.sh

      - name: Run tests (CI) with retry
        env:
          ENVIRONMENT: ci
          CI: 'true'
        run: |
          for attempt in 1 2 3; do
            npm run test:ci && exit 0
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 5))
          done

      - name: Upload CI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results
          path: test-results/ci/
          if-no-files-found: warn
          retention-days: 30
