name: 🏗️ Monorepo CI - All Packages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: core package
  # ──────────────────────────────────────────────
  core:
    name: 🔧 Core Package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint core
        run: npm run lint --workspace=packages/core || true

      - name: Build core
        run: npm run build --workspace=packages/core || true

  # ──────────────────────────────────────────────
  # Job 2: shared-utils package
  # ──────────────────────────────────────────────
  shared-utils:
    name: 🛠️ Shared Utils Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: core
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint shared-utils
        run: npm run lint --workspace=packages/shared-utils || true

      - name: Build shared-utils
        run: npm run build --workspace=packages/shared-utils || true

  # ──────────────────────────────────────────────
  # Job 3: orangehrm-suite package
  # ──────────────────────────────────────────────
  orangehrm-suite:
    name: 🍊 OrangeHRM Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [core, shared-utils]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Remove problematic APT repositories
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Lint orangehrm-suite
        run: npm run lint --workspace=packages/orangehrm-suite || true

      - name: Run OrangeHRM smoke tests
        run: npm run test:smoke --workspace=packages/orangehrm-suite || true

      - name: Upload OrangeHRM test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangehrm-suite-report
          path: packages/orangehrm-suite/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Job 4: hrm-api-suite package
  # ──────────────────────────────────────────────
  hrm-api-suite:
    name: 🔌 HRM API Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [core, shared-utils]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Remove problematic APT repositories
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Lint hrm-api-suite
        run: npm run lint --workspace=packages/hrm-api-suite || true

      - name: Run API tests
        run: npm run test:api --workspace=packages/hrm-api-suite || true

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hrm-api-suite-report
          path: packages/hrm-api-suite/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Job 5: Unified report (root suite)
  # ──────────────────────────────────────────────
  root-suite:
    name: 🧪 Root Suite (Full Regression)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [core, shared-utils]
    permissions:
      contents: read

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run tests - ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }}
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 6: Publish unified report
  # ──────────────────────────────────────────────
  publish-report:
    name: 📊 Publish Unified Report
    runs-on: ubuntu-latest
    needs: [root-suite, orangehrm-suite, hrm-api-suite]
    if: always()
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report-chromium
        continue-on-error: true
