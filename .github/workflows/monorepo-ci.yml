name: 🏗️ Monorepo CI - All Packages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  core:
    name: 🔧 Core Package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint core
        run: npm run lint --workspace=packages/core

      - name: Build core
        run: npm run build --workspace=packages/core

  shared-utils:
    name: 🛠️ Shared Utils Package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: core
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint shared-utils
        run: npm run lint --workspace=packages/shared-utils

      - name: Build shared-utils
        run: npm run build --workspace=packages/shared-utils

  orangehrm-suite:
    name: 🍊 OrangeHRM Suite
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [core, shared-utils]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Remove problematic APT repositories
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Health check OrangeHRM
        run: ./scripts/health-check.sh

      - name: Lint orangehrm-suite
        run: npm run lint --workspace=packages/orangehrm-suite

      - name: Run OrangeHRM smoke tests with retry
        run: |
          for attempt in 1 2 3; do
            npm run test:smoke --workspace=packages/orangehrm-suite && exit 0
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 5))
          done

      - name: Upload OrangeHRM test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangehrm-suite-report
          path: packages/orangehrm-suite/playwright-report/
          if-no-files-found: error
          retention-days: 14

  hrm-api-suite:
    name: 🔌 HRM API Suite
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [core, shared-utils]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Remove problematic APT repositories
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Health check OrangeHRM
        run: ./scripts/health-check.sh

      - name: Lint hrm-api-suite
        run: npm run lint --workspace=packages/hrm-api-suite

      - name: Run API tests with retry
        run: |
          for attempt in 1 2 3; do
            npm run test:api --workspace=packages/hrm-api-suite && exit 0
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 5))
          done

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hrm-api-suite-report
          path: packages/hrm-api-suite/playwright-report/
          if-no-files-found: error
          retention-days: 14

  root-suite:
    name: 🧪 Root Suite (Full Regression)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [core, shared-utils, orangehrm-suite, hrm-api-suite]
    permissions:
      contents: read

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Health check OrangeHRM
        run: ./scripts/health-check.sh

      - name: Run tests - ${{ matrix.browser }}
        run: |
          for attempt in 1 2 3; do
            npx playwright test --project=${{ matrix.browser }} && exit 0
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 5))
          done

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          if-no-files-found: error
          retention-days: 30

  publish-report:
    name: 📊 Publish Unified Report
    runs-on: ubuntu-latest
    needs: [root-suite, orangehrm-suite, hrm-api-suite]
    if: always()
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Validate report artifact
        run: test -d ./playwright-report-chromium

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report-chromium
