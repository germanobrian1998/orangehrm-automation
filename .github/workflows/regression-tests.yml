name: 🔄 Regression Tests

# Run after Smoke Tests pass — only on the main branch
on:
  workflow_run:
    workflows: [ "🔥 Smoke Tests" ]
    types: [ completed ]

permissions:
  contents: read

jobs:
  regression:
    name: Regression Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Only run when smoke-tests succeeded on main
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Remove problematic APT repositories
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Regression Tests
        run: npx playwright test --grep @regression --config packages/orangehrm-suite/playwright.config.ts

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ github.event.workflow_run.head_sha }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-failure-screenshots-${{ github.event.workflow_run.head_sha }}
          path: test-results/
          retention-days: 30
