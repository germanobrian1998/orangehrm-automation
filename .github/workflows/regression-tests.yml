name: 🔄 Regression Tests

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Regression Tests (Shard ${{ matrix.shard }}/4)
        run: npm run test:regression -- --shard=${{ matrix.shard }}/4
        env:
          ORANGEHRM_BASE_URL: ${{ secrets.ORANGEHRM_BASE_URL }}
          ORANGEHRM_ADMIN_USERNAME: ${{ secrets.ORANGEHRM_ADMIN_USERNAME }}
          ORANGEHRM_ADMIN_PASSWORD: ${{ secrets.ORANGEHRM_ADMIN_PASSWORD }}
          CI: true

      - name: Upload Blob Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report
          retention-days: 1

  merge-reports:
    if: always()
    needs: regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*

      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: html-report-final
          path: playwright-report/
          retention-days: 14