name: 🔄 Regression Tests

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Remove problematic APT repositories
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Health check OrangeHRM
        run: ./scripts/health-check.sh

      - name: Run Regression Tests with retry
        run: |
          for attempt in 1 2 3; do
            npx playwright test --grep @regression --config playwright.config.ts && exit 0
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 10))
          done

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Create issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Regression schedule failed - run #${context.runNumber}`,
              body: `Scheduled regression workflow failed. Check: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['ci', 'regression']
            });
