name: 📊 Code Quality

on:
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate lint and TS config
        run: |
          test -f .eslintrc.json
          test -f tsconfig.json

      - name: Run ESLint (strict)
        run: npm run lint -- --max-warnings=0

      - name: Check TypeScript
        run: npx tsc --noEmit
